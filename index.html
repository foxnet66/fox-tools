<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fox Tools</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1d2522;
      --muted: #66736d;
      --line: #d8d2c5;
      --panel: #fffdf8;
      --accent: #0f766e;
      --accent-strong: #0b5f58;
      --warm: #d97706;
      --shadow: 0 18px 60px rgba(29, 37, 34, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(217, 119, 6, 0.07) 1px, transparent 1px),
        var(--bg);
      background-size: 56px 56px;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 22px;
      width: min(1380px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .sidebar {
      position: sticky;
      top: 22px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 44px);
      min-height: 620px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.9);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .workspace {
      min-width: 0;
      padding-top: 8px;
    }

    .sidebar-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .app-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .app-name {
      display: block;
      font-size: 19px;
      font-weight: 820;
      line-height: 1.1;
    }

    .app-desc {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: rgba(246, 244, 239, 0.72);
      font-size: 13px;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      outline: 0;
    }

    .search input::placeholder {
      color: var(--muted);
    }

    .tool-nav {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 18px;
      overflow: auto;
      padding: 16px 12px;
    }

    .nav-section-title {
      margin: 0 6px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .tool-button {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      width: 100%;
      min-height: 58px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--ink);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .tool-button:hover {
      border-color: rgba(15, 118, 110, 0.22);
      background: rgba(15, 118, 110, 0.05);
    }

    .tool-button.active {
      border-color: rgba(15, 118, 110, 0.42);
      background: rgba(15, 118, 110, 0.1);
    }

    .tool-button.disabled {
      color: var(--muted);
      cursor: default;
      opacity: 0.7;
    }

    .tool-button.disabled:hover {
      border-color: transparent;
      background: transparent;
    }

    .tool-icon {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--accent);
      background: rgba(255, 253, 248, 0.95);
      font-weight: 800;
    }

    .tool-name {
      display: block;
      overflow: hidden;
      font-size: 14px;
      font-weight: 780;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-desc {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-foot {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .workspace-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .seal {
      display: grid;
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      place-items: center;
      border: 2px solid var(--accent);
      color: var(--accent);
      background: rgba(255, 253, 248, 0.88);
      box-shadow: var(--shadow);
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 820;
    }

    .tool-help {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 14px;
      margin: -4px 0 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.72);
    }

    .tool-help-title {
      color: var(--accent);
      font-size: 13px;
      font-weight: 820;
      white-space: nowrap;
    }

    .tool-help-list {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tool-help-list li {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .tool-help-list li::before {
      display: grid;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      content: attr(data-step);
      font-size: 11px;
      font-weight: 820;
    }

    .tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(74px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.76);
    }

    .mode button,
    .icon-btn,
    .primary,
    .ghost {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .mode button {
      padding: 0 12px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
    }

    .mode button.active {
      color: #fff;
      background: var(--ink);
    }

    .tool-controls.hidden {
      display: none;
    }

    .mode button:focus-visible,
    .icon-btn:focus-visible,
    .primary:focus-visible,
    .ghost:focus-visible,
    .temperature-input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.28);
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      height: 48px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-size: 15px;
      font-weight: 760;
    }

    .counter {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 420px;
      padding: 18px;
      resize: vertical;
      border: 0;
      color: var(--ink);
      background: transparent;
      font-size: 18px;
      line-height: 1.75;
      letter-spacing: 0;
    }

    textarea::placeholder {
      color: #98a19c;
    }

    .rail {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      min-width: 52px;
    }

    .icon-btn {
      display: grid;
      width: 52px;
      height: 52px;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--ink);
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(29, 37, 34, 0.08);
    }

    .icon-btn:hover,
    .ghost:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 118, 110, 0.38);
    }

    .icon {
      width: 21px;
      height: 21px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .action-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary,
    .ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      border: 1px solid transparent;
      font-weight: 720;
      white-space: nowrap;
    }

    .primary {
      color: #fff;
      background: var(--accent);
    }

    .primary:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .ghost {
      color: var(--ink);
      border-color: var(--line);
      background: rgba(255, 253, 248, 0.86);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .history {
      margin-top: 22px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .history h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .history-item {
      min-height: 72px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 253, 248, 0.76);
      text-align: left;
      cursor: pointer;
    }

    .history-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .history-item span {
      display: -webkit-box;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    .tool-view {
      display: none;
    }

    .tool-view.active {
      display: block;
    }

    .temperature-grid,
    .base-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .temperature-field,
    .base-field {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .temperature-box,
    .base-box {
      position: relative;
      display: block;
      min-height: 116px;
      padding: 23px 18px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.94);
      box-shadow: var(--shadow);
    }

    .temperature-box:focus-within,
    .base-box:focus-within {
      border-color: var(--ink);
      box-shadow: 0 18px 60px rgba(29, 37, 34, 0.16);
    }

    .base-box.invalid {
      border-color: rgba(185, 28, 28, 0.7);
      background: rgba(254, 242, 242, 0.76);
    }

    .temperature-label,
    .base-label {
      position: absolute;
      top: -12px;
      left: 16px;
      padding: 0 8px;
      color: var(--ink);
      background: var(--bg);
      font-size: 18px;
      font-weight: 780;
      line-height: 1.2;
    }

    .temperature-input,
    .base-input {
      width: 100%;
      height: 66px;
      border: 0;
      color: var(--ink);
      background: transparent;
      font-size: 30px;
      font-weight: 680;
      line-height: 1.2;
      outline: 0;
    }

    .temperature-input::placeholder,
    .base-input::placeholder {
      color: #9aa29e;
      font-weight: 620;
    }

    .temperature-meta,
    .base-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .temperature-actions,
    .base-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .info-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 8px;
      color: #155e75;
      background: #e0f2fe;
      font-weight: 720;
    }

    .info-strip .icon {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      color: #0284c7;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
        width: min(100% - 22px, 680px);
        padding-top: 18px;
      }

      .sidebar {
        position: static;
        height: auto;
        min-height: 0;
      }

      .tool-nav {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-height: 230px;
      }

      .workspace {
        padding-top: 0;
      }

      .workspace-head {
        align-items: stretch;
        flex-direction: column;
      }

      .tools {
        justify-content: stretch;
      }

      .tool-help {
        grid-template-columns: 1fr;
      }

      .mode {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .temperature-grid,
      .base-grid {
        grid-template-columns: 1fr;
      }

      .rail {
        flex-direction: row;
        justify-content: center;
      }

      textarea {
        min-height: 260px;
        font-size: 17px;
      }

      .history-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .tool-nav {
        grid-template-columns: 1fr;
      }

      .brand {
        align-items: flex-start;
      }

      .seal {
        width: 46px;
        height: 46px;
        font-size: 22px;
      }

      h1 {
        font-size: 30px;
      }

      .mode {
        grid-template-columns: 1fr;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .temperature-input,
      .base-input {
        font-size: 25px;
      }

      .action-group,
      .primary,
      .ghost {
        width: 100%;
      }

      .primary,
      .ghost {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar" aria-label="工具导航">
      <div class="sidebar-head">
        <div class="app-brand">
          <div class="seal" aria-hidden="true">狐</div>
          <div>
            <span class="app-name">Fox Tools</span>
            <span class="app-desc">常用在线工具箱</span>
          </div>
        </div>
        <label class="search">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <input id="toolSearch" type="search" placeholder="搜索工具">
        </label>
      </div>
      <nav class="tool-nav" id="toolNav" aria-label="工具列表"></nav>
      <div class="sidebar-foot">新增工具时只需要注册工具元数据和对应视图。</div>
    </aside>

    <section class="workspace">
      <header class="workspace-head">
        <div class="brand">
          <div class="seal" id="activeToolIcon" aria-hidden="true">字</div>
          <div>
            <p class="eyebrow" id="toolCategory">文本处理</p>
            <h1 id="toolTitle">简繁互换</h1>
            <p class="subtitle" id="toolSubtitle">常用文本 / 网页文案 / 邮件内容</p>
          </div>
        </div>
        <div class="tools tool-controls" data-tool-controls="chinese-converter" aria-label="转换方向">
          <div class="mode" role="group" aria-label="转换方向">
            <button type="button" class="active" data-mode="s2t">简 → 繁</button>
            <button type="button" data-mode="t2s">繁 → 简</button>
            <button type="button" data-mode="auto">自动</button>
          </div>
        </div>
      </header>

      <section class="tool-help" aria-label="使用说明">
        <div class="tool-help-title">使用说明</div>
        <ol class="tool-help-list" id="toolHelp"></ol>
      </section>

      <div class="tool-view active" id="tool-chinese-converter">
        <section class="grid" aria-label="文本转换">
          <article class="panel">
            <div class="panel-head">
              <span class="panel-title">原文</span>
              <span class="counter" id="inputCount">0 字</span>
            </div>
            <textarea id="source" spellcheck="false" placeholder="粘贴或输入文本"></textarea>
          </article>

          <div class="rail" aria-label="快捷操作">
            <button type="button" class="icon-btn" id="swapBtn" title="交换原文和结果" aria-label="交换原文和结果">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 7h13"></path>
                <path d="m16 3 4 4-4 4"></path>
                <path d="M17 17H4"></path>
                <path d="m8 13-4 4 4 4"></path>
              </svg>
            </button>
            <button type="button" class="icon-btn" id="clearBtn" title="清空" aria-label="清空">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="m19 6-1 14H6L5 6"></path>
                <path d="M10 11v5"></path>
                <path d="M14 11v5"></path>
              </svg>
            </button>
          </div>

          <article class="panel">
            <div class="panel-head">
              <span class="panel-title">结果</span>
              <span class="counter" id="outputCount">0 字</span>
            </div>
            <textarea id="target" spellcheck="false" readonly placeholder="转换结果"></textarea>
          </article>
        </section>

        <section class="actions" aria-label="操作">
          <div class="action-group">
            <button type="button" class="primary" id="copyBtn">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              复制结果
            </button>
            <button type="button" class="ghost" id="pasteBtn">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 4h8"></path>
                <path d="M9 2h6v4H9z"></path>
                <path d="M8 4H6a2 2 0 0 0-2 2v14h16V6a2 2 0 0 0-2-2h-2"></path>
              </svg>
              粘贴
            </button>
          </div>
          <div class="status" id="status" role="status" aria-live="polite"></div>
        </section>

        <section class="history" aria-label="最近记录">
          <div class="history-head">
            <h2>最近记录</h2>
            <button type="button" class="ghost" id="clearHistoryBtn">清除记录</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </div>

      <div class="tool-view" id="tool-temperature">
        <section class="temperature-grid" aria-label="温度转换">
          <fieldset class="temperature-field">
            <label class="temperature-box">
              <span class="temperature-label">摄氏度</span>
              <input class="temperature-input" type="number" inputmode="decimal" data-temperature-unit="celsius" placeholder="请输入摄氏度">
              <span class="temperature-meta">
                <span>°C</span>
                <span>水结冰 0 °C</span>
              </span>
            </label>
          </fieldset>

          <fieldset class="temperature-field">
            <label class="temperature-box">
              <span class="temperature-label">华氏度</span>
              <input class="temperature-input" type="number" inputmode="decimal" data-temperature-unit="fahrenheit" placeholder="请输入华氏度">
              <span class="temperature-meta">
                <span>°F</span>
                <span>水结冰 32 °F</span>
              </span>
            </label>
          </fieldset>

          <fieldset class="temperature-field">
            <label class="temperature-box">
              <span class="temperature-label">开氏度</span>
              <input class="temperature-input" type="number" inputmode="decimal" data-temperature-unit="kelvin" placeholder="请输入开氏度">
              <span class="temperature-meta">

    const temperatureInputs = [...document.querySelectorAll("[data-temperature-unit]")];
    const temperatureStatus = document.querySelector("#temperatureStatus");
    const baseInputs = [...document.querySelectorAll("[data-base]")];
    const baseStatus = document.querySelector("#baseStatus");
    const baseInfo = document.querySelector("#baseInfo span");

    let mode = "s2t";
    let activeToolId = "chinese-converter";
    let statusTimer;
    let temperatureStatusTimer;
    let baseStatusTimer;
    let saveTimer;
    let syncingTemperature = false;
    let syncingBase = false;

    function renderToolNav() {
      const query = toolSearch.value.trim().toLowerCase();
      const visibleTools = toolCatalog.filter(tool => {
        const haystack = `${tool.name} ${tool.category} ${tool.description}`.toLowerCase();
        return !query || haystack.includes(query);
      });
      const grouped = visibleTools.reduce((groups, tool) => {
        groups[tool.category] = groups[tool.category] || [];
        groups[tool.category].push(tool);
        return groups;
      }, {});

      toolNav.innerHTML = "";
      if (!visibleTools.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有匹配的工具";
        toolNav.append(empty);
        return;
      }

      for (const [category, tools] of Object.entries(grouped)) {
        const section = document.createElement("section");
        const title = document.createElement("h2");
        title.className = "nav-section-title";
        title.textContent = category;
        section.append(title);

        for (const tool of tools) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `tool-button ${tool.id === activeToolId ? "active" : ""} ${tool.status !== "ready" ? "disabled" : ""}`;
          button.dataset.toolId = tool.id;
          button.innerHTML = `
            <span class="tool-icon"></span>
            <span>
              <span class="tool-name"></span>
              <span class="tool-desc"></span>
            </span>
          `;
          button.querySelector(".tool-icon").textContent = tool.icon;
          button.querySelector(".tool-name").textContent = tool.name;
          button.querySelector(".tool-desc").textContent = tool.status === "ready" ? tool.description : "即将加入";
          button.addEventListener("click", () => {
            if (tool.status !== "ready") {
              setStatus(`${tool.name} 还未接入`);
              return;
            }
            location.hash = tool.id;
            setActiveTool(tool.id);
          });
          section.append(button);
        }

        toolNav.append(section);
      }
    }

    function setActiveTool(toolId) {
      const tool = toolCatalog.find(item => item.id === toolId && item.status === "ready");
      if (!tool) return;
      activeToolId = tool.id;
      toolTitle.textContent = tool.name;
      toolSubtitle.textContent = tool.description;
      toolCategory.textContent = tool.category;
      activeToolIcon.textContent = tool.icon;
      renderToolHelp(tool);
      document.querySelectorAll(".tool-view").forEach(view => {
        view.classList.toggle("active", view.id === `tool-${tool.id}`);
      });
      toolControls.forEach(control => {
        control.classList.toggle("hidden", control.dataset.toolControls !== tool.id);
      });
      renderToolNav();
    }

    function getInitialToolId() {
      const hashToolId = decodeURIComponent(location.hash.replace(/^#/, ""));
      return toolCatalog.some(tool => tool.id === hashToolId && tool.status === "ready")
        ? hashToolId
        : activeToolId;
    }

    function renderToolHelp(tool) {
      toolHelp.innerHTML = "";
      for (const [index, item] of tool.help.entries()) {
        const step = document.createElement("li");
        step.dataset.step = index + 1;
        step.textContent = item;
        toolHelp.append(step);
      }
    }

    function replacePhrases(text, phrases) {
      return phrases
        .slice()
        .sort((a, b) => b[0].length - a[0].length)
        .reduce((next, item) => next.split(item[0]).join(item[1]), text);
    }

    function convertChars(text, map) {
      return Array.from(text, char => map.get(char) || char).join("");
    }

    function toTraditional(text) {
      return convertChars(replacePhrases(text, s2tPhrases), s2tMap);
    }

    function toSimplified(text) {
      return convertChars(replacePhrases(text, t2sPhrases), t2sMap);
    }

    function detectMode(text) {
      let simplified = 0;
      let traditional = 0;
      for (const char of text) {
        if (s2tMap.has(char)) simplified += 1;
        if (t2sMap.has(char)) traditional += 1;
      }
      return traditional > simplified ? "t2s" : "s2t";
    }

    function convert() {
      const text = source.value;
      const activeMode = mode === "auto" ? detectMode(text) : mode;
      const output = activeMode === "t2s" ? toSimplified(text) : toTraditional(text);
      target.value = output;
      inputCount.textContent = `${Array.from(text).length} 字`;
      outputCount.textContent = `${Array.from(output).length} 字`;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveLast(text, output, activeMode), 700);
    }

    function setMode(nextMode) {
      mode = nextMode;
      modes.forEach(button => button.classList.toggle("active", button.dataset.mode === mode));
      convert();
    }

    function setStatus(text) {
      clearTimeout(statusTimer);
      statusEl.textContent = text;
      statusTimer = setTimeout(() => {
        statusEl.textContent = "";
      }, 1800);
    }

    function setTemperatureStatus(text) {
      clearTimeout(temperatureStatusTimer);
      temperatureStatus.textContent = text;
      temperatureStatusTimer = setTimeout(() => {
        temperatureStatus.textContent = "";
      }, 1800);
    }

    function setBaseStatus(text) {
      clearTimeout(baseStatusTimer);
      baseStatus.textContent = text;
      baseStatusTimer = setTimeout(() => {
        baseStatus.textContent = "";
      }, 1800);
    }

    function roundTemperature(value) {
      if (!Number.isFinite(value)) return "";
      const rounded = Math.round((value + Number.EPSILON) * 1000000) / 1000000;
      return Number.isInteger(rounded) ? String(rounded) : String(rounded);
    }

    function toCelsius(value, unit) {
      switch (unit) {
        case "celsius":
          return value;
        case "fahrenheit":
          return (value - 32) * 5 / 9;
        case "kelvin":
          return value - 273.15;
        case "rankine":
          return (value - 491.67) * 5 / 9;
        case "reaumur":
          return value * 5 / 4;
        default:
          return value;
      }
    }

    function fromCelsius(celsius, unit) {
      switch (unit) {
        case "celsius":
          return celsius;
        case "fahrenheit":
          return celsius * 9 / 5 + 32;
        case "kelvin":
          return celsius + 273.15;
        case "rankine":
          return (celsius + 273.15) * 9 / 5;
        case "reaumur":
          return celsius * 4 / 5;
        default:
          return celsius;
      }
    }

    function updateTemperatures(sourceInput) {
      if (syncingTemperature) return;
      const raw = sourceInput.value.trim();
      syncingTemperature = true;

      if (raw === "") {
        temperatureInputs.forEach(input => {
          if (input !== sourceInput) input.value = "";
        });
        syncingTemperature = false;
        return;
      }

      const value = Number(raw);
      if (!Number.isFinite(value)) {
        syncingTemperature = false;
        return;
      }

      const celsius = toCelsius(value, sourceInput.dataset.temperatureUnit);
      temperatureInputs.forEach(input => {
        if (input === sourceInput) return;
        input.value = roundTemperature(fromCelsius(celsius, input.dataset.temperatureUnit));
      });
      syncingTemperature = false;
    }

    function clearTemperatures() {
      temperatureInputs.forEach(input => {
        input.value = "";
      });
      temperatureInputs[0].focus();
      setTemperatureStatus("已清空");
    }

    const baseDigits = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    function normalizeBaseInput(value) {
      return value.trim().replace(/\s+/g, "").toUpperCase();
    }

    function parseBaseInteger(raw, base) {
      const normalized = normalizeBaseInput(raw);
      if (!normalized) return null;
      const negative = normalized.startsWith("-");
      const body = negative ? normalized.slice(1) : normalized;
      if (!body) return null;

      let result = 0n;
      const bigBase = BigInt(base);
      for (const char of body) {
        const digit = baseDigits.indexOf(char);
        if (digit < 0 || digit >= base) return null;
        result = result * bigBase + BigInt(digit);
      }
      return negative ? -result : result;
    }

    function formatBaseInteger(value, base) {
      const negative = value < 0n;
      let next = negative ? -value : value;
      const bigBase = BigInt(base);
      if (next === 0n) return "0";

      let output = "";
      while (next > 0n) {
        const digit = Number(next % bigBase);
        output = baseDigits[digit] + output;
        next = next / bigBase;
      }
      return negative ? `-${output}` : output;
    }

    function setBaseValidity(activeInput, isValid) {
      baseInputs.forEach(input => {
        input.closest(".base-box").classList.toggle("invalid", input === activeInput && !isValid);
      });
    }

    function updateBaseValues(sourceInput) {
      if (syncingBase) return;
      const raw = normalizeBaseInput(sourceInput.value);
      syncingBase = true;

      if (raw === "") {
        baseInputs.forEach(input => {
          if (input !== sourceInput) input.value = "";
        });
        setBaseValidity(sourceInput, true);
        baseInfo.textContent = "请规范地输入相应进制，否则将无法正确计算";
        syncingBase = false;
        return;
      }

      const base = Number(sourceInput.dataset.base);
      const parsed = parseBaseInteger(raw, base);
      if (parsed === null) {
        baseInputs.forEach(input => {
          if (input !== sourceInput) input.value = "";
        });
        setBaseValidity(sourceInput, false);
        baseInfo.textContent = `${base} 进制输入不合法，请检查字符范围`;
        syncingBase = false;
        return;
      }

      sourceInput.value = raw;
      setBaseValidity(sourceInput, true);
      baseInfo.textContent = "请规范地输入相应进制，否则将无法正确计算";
      baseInputs.forEach(input => {
        if (input === sourceInput) return;
        input.value = formatBaseInteger(parsed, Number(input.dataset.base));
      });
      syncingBase = false;
    }

    function clearBaseValues() {
      baseInputs.forEach(input => {
        input.value = "";
        input.closest(".base-box").classList.remove("invalid");
      });
      baseInfo.textContent = "请规范地输入相应进制，否则将无法正确计算";
      baseInputs[0].focus();
      setBaseStatus("已清空");
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem("fox-tools-history") || "[]");
      } catch {
        return [];
      }
    }

    function renderHistory() {
      const history = loadHistory();
      historyList.innerHTML = "";
      if (!history.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "暂无记录";
        historyList.append(empty);
        return;
      }

      for (const item of history.slice(0, 3)) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "history-item";
        button.innerHTML = `<strong>${item.mode === "t2s" ? "繁 → 简" : "简 → 繁"}</strong><span></span>`;
        button.querySelector("span").textContent = item.source;
        button.addEventListener("click", () => {
          source.value = item.source;
          setMode(item.mode);
          convert();
          setStatus("已载入");
        });
        historyList.append(button);
      }
    }

    function saveLast(input, output, activeMode) {
      if (input.trim().length < 2 || output.trim().length < 2) return;
      const history = loadHistory().filter(item => item.source !== input);
      history.unshift({
        source: input.slice(0, 240),
        output: output.slice(0, 240),
        mode: activeMode
      });
      localStorage.setItem("fox-tools-history", JSON.stringify(history.slice(0, 6)));
      renderHistory();
    }

    modes.forEach(button => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    toolSearch.addEventListener("input", renderToolNav);
    source.addEventListener("input", convert);
    temperatureInputs.forEach(input => {
      input.addEventListener("input", () => updateTemperatures(input));
      input.addEventListener("focus", () => input.select());
    });
    baseInputs.forEach(input => {
      input.addEventListener("input", () => updateBaseValues(input));
      input.addEventListener("focus", () => input.select());
    });

    document.querySelector("#swapBtn").addEventListener("click", () => {
      const input = source.value;
      source.value = target.value;
      target.value = input;
      mode = mode === "s2t" ? "t2s" : mode === "t2s" ? "s2t" : "auto";
      modes.forEach(button => button.classList.toggle("active", button.dataset.mode === mode));
      convert();
      setStatus("已交换");
    });

    document.querySelector("#clearBtn").addEventListener("click", () => {
      source.value = "";
      target.value = "";
      convert();
      source.focus();
      setStatus("已清空");
    });

    document.querySelector("#copyBtn").addEventListener("click", async () => {
      if (!target.value) {
        setStatus("没有可复制的内容");
        return;
      }
      try {
        await navigator.clipboard.writeText(target.value);
        setStatus("已复制");
      } catch {
        target.select();
        document.execCommand("copy");
        setStatus("已复制");
      }
    });

    document.querySelector("#pasteBtn").addEventListener("click", async () => {
      try {
        source.value = await navigator.clipboard.readText();
        convert();
        setStatus("已粘贴");
      } catch {
        source.focus();
        setStatus("浏览器未允许读取剪贴板");
      }
    });

    document.querySelector("#clearHistoryBtn").addEventListener("click", () => {
      localStorage.removeItem("fox-tools-history");
      renderHistory();
      setStatus("记录已清除");
    });

    document.querySelector("#clearTemperatureBtn").addEventListener("click", clearTemperatures);
    document.querySelector("#clearBaseBtn").addEventListener("click", clearBaseValues);

    window.addEventListener("hashchange", () => setActiveTool(getInitialToolId()));

    setActiveTool(getInitialToolId());
    convert();
    renderHistory();
  </script>
</body>
</html>
